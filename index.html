<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الواجبات المدرسية</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a5298; --bg: #f0f2f5; --whatsapp: #25D366; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .header { background: linear-gradient(180deg, #2a75bb, #1a5298); color: white; text-align: center; padding: 25px 10px; border-radius: 0 0 30px 30px; }
        .container { max-width: 500px; margin: -20px auto 20px; padding: 0 15px; }
        .admin-card { background: white; border-radius: 20px; padding: 20px; display: none; border: 2px solid var(--primary); margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-family: 'Cairo'; }
        .btn-post { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        .hw-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: relative; }
        .badge-page { position: absolute; left: 15px; top: 15px; background: #e74c3c; color: white; padding: 5px 12px; border-radius: 8px; font-size: 13px; font-weight: bold; }
        .badge-stage { background: #f39c12; color: white; padding: 2px 8px; border-radius: 5px; font-size: 11px; margin-right: 5px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; background: #f8f9fa; padding: 12px; border-radius: 12px; }
        .hw-img { width: 100%; border-radius: 12px; margin-top: 15px; border: 1px solid #ddd; }
        .share-section { display: flex; gap: 10px; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .btn-share { flex: 1; padding: 10px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 13px; }
        .btn-wa { background: #25D366; } .btn-tg { background: #0088cc; }
        .settings-btn { position: fixed; bottom: 20px; left: 20px; background: #fff; border: 1px solid #ddd; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="header">
    <h1 id="schoolTitle">منصة الواجبات</h1>
    <p id="locationTitle">جاري تحميل البيانات...</p>
</div>

<div class="container">
    <div id="adminPanel" class="admin-card">
        <h3 style="text-align:center;">إضافة واجب جديد</h3>
        <input type="text" id="inSchool" placeholder="اسم المدرسة">
        <div style="display:flex; gap:10px;">
            <select id="inStage">
                <option value="الابتدائية">ابتدائي</option>
                <option value="المتوسطة">متوسطة</option>
                <option value="الإعدادية">إعدادي</option>
            </select>
            <select id="inGrade">
                <option>الأول</option><option>الثاني</option><option>الثالث</option>
                <option>الرابع</option><option>الخامس</option><option>السادس</option>
            </select>
        </div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="inLoc" placeholder="المحافظة">
            <input type="text" id="inDistrict" placeholder="القضاء">
        </div>
        <input type="text" id="inTeacher" placeholder="اسم المدرس">
        <div style="display:flex; gap:10px;">
            <input type="text" id="inSubj" placeholder="المادة">
            <input type="number" id="inPage" placeholder="الصفحة">
        </div>
        <textarea id="inNotes" placeholder="تفاصيل الواجب..."></textarea>
        <input type="file" id="inImg" accept="image/*">
        <button class="btn-post" onclick="processUpload()">🚀 نشر الواجب</button>
    </div>
    <div id="tasksContainer"></div>
</div>

<button class="settings-btn" onclick="openAdmin()">⚙️</button>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC7uiBBwE7DMrC5rWeNkNSnbfS-lJ99kpU",
        authDomain: "myschoolapp-fc61c.firebaseapp.com",
        databaseURL: "https://myschoolapp-fc61c-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "myschoolapp-fc61c",
        storageBucket: "myschoolapp-fc61c.firebasestorage.app",
        appId: "1:187032779714:web:9e7d0f3660c24b1c71b45b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function openAdmin() { if(prompt("الرمز:") === "1234") document.getElementById('adminPanel').style.display = 'block'; }

    async function processUpload() {
        const file = document.getElementById('inImg').files[0];
        if(file) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => saveTask(reader.result);
        } else { saveTask(""); }
    }

    async function saveTask(imgData) {
        const taskData = {
            school: document.getElementById('inSchool').value,
            stage: document.getElementById('inStage').value,
            grade: document.getElementById('inGrade').value,
            loc: document.getElementById('inLoc').value,
            district: document.getElementById('inDistrict').value,
            teacher: document.getElementById('inTeacher').value,
            subj: document.getElementById('inSubj').value,
            page: document.getElementById('inPage').value,
            notes: document.getElementById('inNotes').value,
            img: imgData,
            time: new Date().toLocaleString('ar-EG'),
            ts: Date.now()
        };
        await db.ref('homework').push(taskData);
        location.reload();
    }

    function share(platform, v) {
        const text = `📚 *واجب جديد* %0A🏫 *المدرسة:* ${v.school} ${v.stage}%0A📖 *المادة:* ${v.subj}%0A👨‍🏫 *الأستاذ:* ${v.teacher}%0A🎓 *الصف:* ${v.grade}%0A📝 *الواجب:* ${v.notes}`;
        let url = platform === 'wa' ? `https://wa.me/?text=${text}` : `https://t.me/share/url?url=${window.location.href}&text=${text}`;
        window.open(url, '_blank');
    }

    db.ref('homework').orderByChild('ts').on('value', snap => {
        const container = document.getElementById('tasksContainer');
        container.innerHTML = "";
        snap.forEach(child => {
            const v = child.val();
            document.getElementById('schoolTitle').innerText = "مدرسة " + v.school;
            document.getElementById('locationTitle').innerText = v.loc + " - " + v.district;
            container.insertAdjacentHTML('afterbegin', `
                <div class="hw-card">
                    <div class="badge-page">ص ${v.page}</div>
                    <h2 style="color:var(--primary);">📚 ${v.subj} <span class="badge-stage">${v.stage}</span></h2>
                    <div class="info-grid">
                        <div style="font-size:12px;">المدرس: <b>${v.teacher}</b></div>
                        <div style="font-size:12px;">الصف: <b>${v.grade}</b></div>
                    </div>
                    <p style="font-size:14px; line-height:1.6;">${v.notes}</p>
                    ${v.img ? `<img src="${v.img}" class="hw-img">` : ""}
                    <div class="share-section">
                        <button class="btn-share btn-wa" onclick="share('wa', ${JSON.stringify(v)})">🟢 واتساب</button>
                        <button class="btn-share btn-tg" onclick="share('tg', ${JSON.stringify(v)})">🔵 تليجرام</button>
                    </div>
                </div>
            `);
        });
    });
</script>
</body>
</html>
