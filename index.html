<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الواجبات المدرسية</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a5298; --bg: #f0f2f5; --whatsapp: #25D366; --telegram: #0088cc; --edit: #f39c12; --del: #c0392b; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .header { background: linear-gradient(180deg, #2a75bb, #1a5298); color: white; text-align: center; padding: 35px 10px; border-radius: 0 0 40px 40px; margin-bottom: 25px; }
        .container { max-width: 500px; margin: 0 auto 20px; padding: 0 15px; }
        
        .admin-card { background: white; border-radius: 20px; padding: 20px; display: none; border: 2px solid var(--primary); margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-family: 'Cairo'; }
        
        .camera-section { display: flex; gap: 10px; margin: 10px 0; }
        .cam-btn { flex: 1; background: #f8f9fa; border: 2px dashed var(--primary); padding: 15px; border-radius: 12px; cursor: pointer; text-align: center; color: var(--primary); font-weight: bold; }
        
        .btn-post { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        
        .hw-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: relative; border: 1px solid #eee; }
        .badge-page { position: absolute; left: 15px; top: 15px; background: #e74c3c; color: white; padding: 6px 14px; border-radius: 10px; font-size: 14px; font-weight: bold; z-index: 5; }
        
        .post-date { font-size: 11px; color: #777; background: #f0f2f5; padding: 3px 10px; border-radius: 5px; display: inline-block; margin-bottom: 10px; }

        .card-header { border-bottom: 2px solid #f8f9fa; padding-bottom: 12px; margin-bottom: 15px; }
        .school-info { color: var(--primary); font-weight: 900; font-size: 18px; display: block; margin-bottom: 4px; }
        
        /* تنسيق المحافظة والقضاء */
        .location-info { font-size: 13px; color: #555; display: flex; align-items: center; gap: 5px; margin-bottom: 8px; }
        .location-info i { color: #e74c3c; }

        .teacher-info { background: #f0f4f8; color: #333; padding: 5px 12px; border-radius: 8px; font-size: 14px; display: inline-flex; align-items: center; gap: 5px; border: 1px dashed #1a5298; }
        
        .notes-text { font-size: 15px; line-height: 1.6; color: #444; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; margin-bottom: 5px; margin-top: 10px; }
        .notes-text.expanded { -webkit-line-clamp: unset; display: block; }
        .read-more-btn { color: var(--primary); border: none; background: none; font-weight: bold; cursor: pointer; padding: 0 0 10px 0; font-family: 'Cairo'; }

        .hw-img { width: 100%; border-radius: 15px; margin-top: 10px; border: 1px solid #eee; }
        
        .share-bar { display: flex; gap: 8px; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .share-btn { flex: 1; border: none; padding: 10px; border-radius: 10px; color: white; display: flex; align-items: center; justify-content: center; gap: 5px; text-decoration: none; font-size: 13px; font-weight: bold; cursor: pointer; }
        .btn-wa { background-color: var(--whatsapp); }

        .admin-controls { display: none; gap: 8px; margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 15px; }
        .control-btn { flex: 1; border: none; padding: 10px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-edit { background-color: var(--edit); }
        .btn-del { background-color: var(--del); }
        
        .settings-btn { position: fixed; bottom: 25px; left: 25px; background: #fff; width: 55px; height: 55px; border-radius: 50%; cursor: pointer; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    </style>
</head>
<body>

<div class="header">
    <h1>منصة الواجبات العراقية</h1>
    <p>تابع دروسك حسب محافظتك وقضائك</p>
</div>

<div class="container">
    <div id="adminPanel" class="admin-card">
        <h3 id="panelTitle" style="text-align:center;">إضافة واجب جديد</h3>
        <input type="hidden" id="editKey">
        <div style="display:flex; gap:10px;">
            <input type="text" id="inProvince" placeholder="المحافظة (مثال: البصرة)">
            <input type="text" id="inDistrict" placeholder="القضاء (مثال: الزبير)">
        </div>
        <input type="text" id="inSchool" placeholder="اسم المدرسة">
        <input type="text" id="inTeacher" placeholder="اسم المدرس">
        <div style="display:flex; gap:10px;">
            <input type="text" id="inSubj" placeholder="المادة">
            <input type="number" id="inPage" placeholder="الصفحة">
        </div>
        <textarea id="inNotes" style="height:120px;" placeholder="اكتب تفاصيل الواجب هنا..."></textarea>
        
        <div class="camera-section">
            <label class="cam-btn">
                <i class="fas fa-camera"></i> تصوير مباشر
                <input type="file" id="takePic" accept="image/*" capture="environment" style="display:none" onchange="previewImg(this)">
            </label>
            <label class="cam-btn">
                <i class="fas fa-images"></i> من المعرض
                <input type="file" id="pickPic" accept="image/*" style="display:none" onchange="previewImg(this)">
            </label>
        </div>
        <div id="imgStatus" style="text-align:center; font-size:12px; color:green; margin-bottom:10px; display:none;">✅ تم اختيار الصورة</div>

        <button class="btn-post" id="mainBtn" onclick="processUpload()">🚀 نشر الواجب</button>
        <button class="btn-post" id="cancelBtn" style="display:none; background:#7f8c8d; margin-top:10px;" onclick="location.reload()">إلغاء</button>
    </div>
    <div id="tasksContainer"></div>
</div>

<button class="settings-btn" onclick="openAdmin()"><i class="fas fa-cog"></i></button>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC7uiBBwE7DMrC5rWeNkNSnbfS-lJ99kpU",
        authDomain: "myschoolapp-fc61c.firebaseapp.com",
        databaseURL: "https://myschoolapp-fc61c-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "myschoolapp-fc61c",
        storageBucket: "myschoolapp-fc61c.firebasestorage.app",
        appId: "1:187032779714:web:9e7d0f3660c24b1c71b45b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let selectedImg = "";
    let isLogged = false;

    function openAdmin() { 
        if(prompt("الرمز:") === "2025") {
            isLogged = true;
            document.getElementById('adminPanel').style.display = 'block';
            document.querySelectorAll('.admin-controls').forEach(el => el.style.display = 'flex');
        }
    }

    function previewImg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { selectedImg = e.target.result; document.getElementById('imgStatus').style.display = 'block'; };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function processUpload() {
        const key = document.getElementById('editKey').value;
        const now = new Date();
        const dateStr = now.toLocaleDateString('ar-EG');
        const timeStr = now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });

        const data = {
            province: document.getElementById('inProvince').value,
            district: document.getElementById('inDistrict').value,
            school: document.getElementById('inSchool').value,
            teacher: document.getElementById('inTeacher').value,
            subj: document.getElementById('inSubj').value,
            page: document.getElementById('inPage').value,
            notes: document.getElementById('inNotes').value,
            img: selectedImg,
            date: dateStr,
            time: timeStr,
            ts: Date.now()
        };
        if(key) await db.ref('homework/'+key).update(data);
        else await db.ref('homework').push(data);
        location.reload();
    }

    function edit(key, d) {
        document.getElementById('editKey').value = key;
        document.getElementById('inProvince').value = d.province || "";
        document.getElementById('inDistrict').value = d.district || "";
        document.getElementById('inSchool').value = d.school;
        document.getElementById('inTeacher').value = d.teacher;
        document.getElementById('inSubj').value = d.subj;
        document.getElementById('inPage').value = d.page;
        document.getElementById('inNotes').value = d.notes;
        selectedImg = d.img || "";
        document.getElementById('panelTitle').innerText = "📝 تعديل الواجب";
        document.getElementById('mainBtn').innerText = "تحديث";
        document.getElementById('cancelBtn').style.display = 'block';
        window.scrollTo(0,0);
    }

    function toggleText(btn) {
        const p = btn.previousElementSibling;
        p.classList.toggle('expanded');
        btn.innerText = p.classList.contains('expanded') ? "عرض أقل" : "اقرأ المزيد...";
    }

    db.ref('homework').orderByChild('ts').on('value', snap => {
        const container = document.getElementById('tasksContainer');
        container.innerHTML = "";
        snap.forEach(child => {
            const v = child.val(); const k = child.key;
            const hasMore = v.notes.length > 120;
            container.insertAdjacentHTML('afterbegin', `
                <div class="hw-card">
                    <div class="badge-page">ص ${v.page}</div>
                    <div class="post-date">🕒 ${v.date} | ${v.time}</div>
                    <div class="card-header">
                        <span class="school-info">🏫 مدرسة ${v.school}</span>
                        <div class="location-info">
                            <i class="fas fa-map-marker-alt"></i> ${v.province || 'غير محدد'} - ${v.district || 'قضاء عام'}
                        </div>
                        <div class="teacher-info"><i class="fas fa-user-tie"></i> المدرس: <b>${v.teacher}</b></div>
                    </div>
                    <h2 style="color:var(--primary); font-size:18px;">📚 مادة ${v.subj}</h2>
                    <p class="notes-text">${v.notes.replace(/\n/g, '<br>')}</p>
                    ${hasMore ? `<button class="read-more-btn" onclick="toggleText(this)">اقرأ المزيد...</button>` : ''}
                    ${v.img ? `<img src="${v.img}" class="hw-img">` : ""}
                    
                    <div class="share-bar">
                        <button onclick="window.open('https://wa.me/?text='+encodeURIComponent('واجب ${v.subj}\\nمدرسة ${v.school}\\nالموقع: ${v.province}-${v.district}'), '_blank')" class="share-btn btn-wa"><i class="fab fa-whatsapp"></i> واتساب</button>
                    </div>

                    <div class="admin-controls" style="display: ${isLogged ? 'flex' : 'none'}">
                        <button onclick='edit("${k}", ${JSON.stringify(v)})' class="control-btn btn-edit">تعديل</button>
                        <button onclick="if(confirm('حذف؟')) db.ref('homework/${k}').remove()" class="control-btn btn-del">حذف</button>
                    </div>
                </div>
            `);
        });
    });
</script>
</body>
</html>
