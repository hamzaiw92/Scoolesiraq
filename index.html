<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الواجبات المدرسية</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a5298; --bg: #f0f2f5; --whatsapp: #25D366; --telegram: #0088cc; --edit: #f39c12; --del: #c0392b; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .header { background: linear-gradient(180deg, #2a75bb, #1a5298); color: white; text-align: center; padding: 35px 10px; border-radius: 0 0 40px 40px; margin-bottom: 25px; }
        .container { max-width: 500px; margin: 0 auto 20px; padding: 0 15px; }
        .admin-card { background: white; border-radius: 20px; padding: 20px; display: none; border: 2px solid var(--primary); margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-family: 'Cairo'; }
        .btn-post { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; }
        .hw-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: relative; border: 1px solid #eee; }
        .post-time { font-size: 11px; color: #888; background: #f8f9fa; padding: 4px 10px; border-radius: 8px; margin-bottom: 12px; display: inline-block; border: 1px solid #eee; }
        .card-header { border-bottom: 2px solid #f8f9fa; padding-bottom: 12px; margin-bottom: 15px; }
        .school-info { color: var(--primary); font-weight: 900; font-size: 18px; display: block; }
        .badge-page { position: absolute; left: 15px; top: 15px; background: #e74c3c; color: white; padding: 6px 14px; border-radius: 10px; font-size: 14px; font-weight: bold; z-index: 1; }
        .hw-img { width: 100%; border-radius: 15px; margin-top: 15px; border: 1px solid #eee; }
        .share-bar { display: flex; gap: 8px; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .share-btn { flex: 1; border: none; padding: 10px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; text-decoration: none; font-size: 12px; }
        .btn-wa { background-color: var(--whatsapp); }
        .btn-tg { background-color: var(--telegram); }
        
        /* تنسيق أزرار التحكم للمدرس */
        .admin-controls { display: none; gap: 8px; margin-top: 12px; border-top: 1px dashed #ddd; padding-top: 12px; }
        .control-btn { flex: 1; border: none; padding: 8px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-family: 'Cairo'; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-edit { background-color: var(--edit); }
        .btn-del { background-color: var(--del); }

        .settings-btn { position: fixed; bottom: 25px; left: 25px; background: #fff; width: 55px; height: 55px; border-radius: 50%; cursor: pointer; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    </style>
</head>
<body>

<div class="header">
    <h1 id="mainTitle">منصة الواجبات المدرسية</h1>
    <p id="mainSub">نظام متابعة الدروس الذكي</p>
</div>

<div class="container">
    <div id="adminPanel" class="admin-card">
        <h3 id="panelTitle" style="text-align:center; color: var(--primary);">إضافة واجب جديد</h3>
        <input type="hidden" id="editKey">
        <input type="text" id="inSchool" placeholder="اسم المدرسة">
        <input type="text" id="inLoc" placeholder="المكان (مثلاً: كركوك - حي القدس)">
        <div style="display:flex; gap:10px;">
            <select id="inType"><option value="بنين">بنين</option><option value="بنات">بنات</option><option value="مختلط">مختلط</option></select>
            <input type="text" id="inSection" placeholder="الشعبة (أ، ب..)">
        </div>
        <input type="text" id="inTeacher" placeholder="اسم المدرس">
        <div style="display:flex; gap:10px;">
            <input type="text" id="inSubj" placeholder="المادة">
            <input type="number" id="inPage" placeholder="الصفحة">
        </div>
        <textarea id="inNotes" style="height:100px;" placeholder="تفاصيل الواجب..."></textarea>
        <input type="file" id="inImg" accept="image/*">
        <button class="btn-post" id="mainBtn" onclick="processUpload()">🚀 نشر الواجب</button>
        <button class="btn-post" id="cancelBtn" style="display:none; background:#7f8c8d; margin-top:10px;" onclick="location.reload()">إلغاء التعديل</button>
    </div>
    <div id="tasksContainer"></div>
</div>

<button class="settings-btn" onclick="openAdmin()"><i class="fas fa-cog"></i></button>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC7uiBBwE7DMrC5rWeNkNSnbfS-lJ99kpU",
        authDomain: "myschoolapp-fc61c.firebaseapp.com",
        databaseURL: "https://myschoolapp-fc61c-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "myschoolapp-fc61c",
        storageBucket: "myschoolapp-fc61c.firebasestorage.app",
        appId: "1:187032779714:web:9e7d0f3660c24b1c71b45b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let isAdmin = false;

    function openAdmin() { 
        if(prompt("الرمز السري:") === "2025") {
            isAdmin = true;
            document.getElementById('adminPanel').style.display = 'block';
            document.querySelectorAll('.admin-controls').forEach(el => el.style.display = 'flex');
            window.scrollTo(0,0);
        }
    }

    async function processUpload() {
        const file = document.getElementById('inImg').files[0];
        const key = document.getElementById('editKey').value;
        if(file) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => save(reader.result, key);
        } else { save("", key); }
    }

    async function save(img, key) {
        const data = {
            school: document.getElementById('inSchool').value,
            loc: document.getElementById('inLoc').value,
            type: document.getElementById('inType').value,
            section: document.getElementById('inSection').value,
            teacher: document.getElementById('inTeacher').value,
            subj: document.getElementById('inSubj').value,
            page: document.getElementById('inPage').value,
            notes: document.getElementById('inNotes').value,
            img: img || "",
            fullDate: new Date().toLocaleString('ar-EG'),
            ts: Date.now()
        };
        if(key) await db.ref('homework/'+key).update(data);
        else await db.ref('homework').push(data);
        location.reload();
    }

    // دالة تعبئة البيانات للتعديل
    function startEdit(key, d) {
        document.getElementById('editKey').value = key;
        document.getElementById('inSchool').value = d.school;
        document.getElementById('inLoc').value = d.loc;
        document.getElementById('inType').value = d.type;
        document.getElementById('inSection').value = d.section;
        document.getElementById('inTeacher').value = d.teacher;
        document.getElementById('inSubj').value = d.subj;
        document.getElementById('inPage').value = d.page;
        document.getElementById('inNotes').value = d.notes;
        document.getElementById('panelTitle').innerText = "📝 تعديل المنشور";
        document.getElementById('mainBtn').innerText = "تحديث التعديلات";
        document.getElementById('cancelBtn').style.display = 'block';
        window.scrollTo(0,0);
    }

    function sharePost(type, school, subj, page) {
        const text = `📌 واجب مدرسة ${school}\n📚 مادة: ${subj}\n📖 ص: ${page}\n🔗 الرابط: ${window.location.href}`;
        const url = type === 'wa' ? `https://wa.me/?text=${encodeURIComponent(text)}` : `https://t.me/share/url?url=${window.location.href}&text=${encodeURIComponent(text)}`;
        window.open(url, '_blank');
    }

    db.ref('homework').orderByChild('ts').on('value', snap => {
        const container = document.getElementById('tasksContainer');
        container.innerHTML = "";
        snap.forEach(child => {
            const v = child.val();
            const k = child.key;
            document.getElementById('mainTitle').innerText = "منصة " + v.school;
            container.insertAdjacentHTML('afterbegin', `
                <div class="hw-card">
                    <div class="badge-page">ص ${v.page}</div>
                    <div class="post-time">🕒 ${v.fullDate}</div>
                    <div class="card-header">
                        <span class="school-info">🏫 مدرسة ${v.school}</span>
                        <span style="font-size:12px; color:#666;">📍 ${v.loc} | شعبه ${v.section} (${v.type})</span>
                    </div>
                    <h2 style="color:var(--primary); font-size:18px;">📚 واجب ${v.subj}</h2>
                    <p>المدرس: <b>${v.teacher}</b></p>
                    <p>${v.notes}</p>
                    ${v.img ? `<img src="${v.img}" class="hw-img">` : ""}
                    
                    <div class="share-bar">
                        <button onclick="sharePost('wa', '${v.school}', '${v.subj}', '${v.page}')" class="share-btn btn-wa"><i class="fab fa-whatsapp"></i> واتساب</button>
                        <button onclick="sharePost('tg', '${v.school}', '${v.subj}', '${v.page}')" class="share-btn btn-tg"><i class="fab fa-telegram"></i> تليجرام</button>
                    </div>

                    <div class="admin-controls" style="display: ${isAdmin ? 'flex' : 'none'}">
                        <button onclick='startEdit("${k}", ${JSON.stringify(v)})' class="control-btn btn-edit"><i class="fas fa-edit"></i> تعديل</button>
                        <button onclick="if(confirm('حذف نهائي؟')) db.ref('homework/${k}').remove().then(()=>location.reload())" class="control-btn btn-del"><i class="fas fa-trash"></i> حذف</button>
                    </div>
                </div>
            `);
        });
    });
</script>
</body>
            </html>
