<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الواجبات اليومية</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main-blue: #007bff; --bg-gray: #f4f7f6; --text-color: #333; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-gray); margin: 0; padding: 0; color: var(--text-color); }
        .header { background: linear-gradient(180deg, #2a75bb 0%, #1a5298 100%); color: white; text-align: center; padding: 40px 20px; border-radius: 0 0 50px 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header h1 { margin: 0; font-size: 28px; font-weight: 900; }
        .header p { margin: 10px 0 0; opacity: 0.9; font-size: 16px; }
        .container { max-width: 500px; margin: -30px auto 20px; padding: 0 15px; }
        .card { background: white; border-radius: 25px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 20px; border: 1px solid #eee; }
        .admin-section { display: none; border: 2px dashed #2a75bb; padding: 20px; margin-bottom: 30px; background: #fff; border-radius: 25px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; font-family: 'Cairo'; font-size: 14px; box-sizing: border-box; background: #fafafa; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-post { background: #1a5298; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .task-item { position: relative; padding-top: 10px; }
        .task-badge { position: absolute; left: 0; top: 0; background: #ff4757; color: white; padding: 5px 15px; border-radius: 10px; font-weight: bold; font-size: 14px; }
        .info-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .info-unit { background: #f8f9fa; padding: 10px; border-radius: 15px; text-align: center; border: 1px solid #edf2f7; }
        .info-unit span { display: block; font-size: 12px; color: #718096; }
        .info-unit b { font-size: 14px; color: #2d3748; }
        .hw-img { width: 100%; border-radius: 15px; margin-top: 10px; cursor: pointer; }
        .share-row { display: flex; gap: 10px; margin-top: 15px; }
        .share-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; color: white; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; font-size: 13px; }
        .btn-wa { background: #25d366; }
        .btn-tg { background: #0088cc; }
        .settings-float { position: fixed; bottom: 20px; left: 20px; background: #cbd5e0; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1 id="topSchool">منصة الواجبات المدرسية</h1>
    <p id="topSub">محافظة البصرة - مدرسة النخيلة</p>
</div>

<div class="container">
    <div id="adminPanel" class="admin-section">
        <h3 style="text-align:center; color:#1a5298;">👨‍🏫 لوحة نشر الواجبات</h3>
        <div class="grid-inputs">
            <input type="text" id="inSchool" placeholder="اسم المدرسة">
            <input type="text" id="inLoc" placeholder="المحافظة">
        </div>
        <input type="text" id="inTeacher" placeholder="اسم المدرس">
        <div class="grid-inputs">
            <input type="text" id="inSubj" placeholder="المادة">
            <input type="text" id="inPage" placeholder="رقم الصفحة">
        </div>
        <div class="grid-inputs">
            <select id="inGrade"><option>الأول</option><option>الثاني</option><option>الثالث</option><option>الرابع</option><option>الخامس</option><option>السادس</option></select>
            <select id="inGender"><option>بنين</option><option>بنات</option></select>
        </div>
        <input type="text" id="inSection" placeholder="الشعبة (مثلاً: أ)">
        <textarea id="inNotes" rows="3" placeholder="ملاحظات المدرس..."></textarea>
        <input type="file" id="inImg" accept="image/*" style="padding:5px;">
        <button class="btn-post" onclick="uploadTask()">✅ نشر للطلاب والأهالي</button>
        <p id="status" style="text-align:center; font-size:12px; color:blue; display:none;">جاري الرفع...</p>
    </div>

    <div id="tasksList">
        <p style="text-align:center; color:#888; margin-top:50px;">جاري جلب الواجبات من السحاب...</p>
    </div>
</div>

<button class="settings-float" onclick="checkPass()">⚙️</button>

<script>
    // بياناتك الحقيقية من لقطة الشاشة
    const firebaseConfig = {
        apiKey: "AIzaSyC7uiBBwE7DMrC5rWeNkNSnbfS-lJ99kpU",
        authDomain: "myschoolapp-fc61c.firebaseapp.com",
        databaseURL: "https://myschoolapp-fc61c-default-rtdb.firebaseio.com",
        projectId: "myschoolapp-fc61c",
        storageBucket: "myschoolapp-fc61c.appspot.com",
        messagingSenderId: "187032779714",
        appId: "1:187032779714:web:9e7d0f3660c24b1c71b45b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    function checkPass() {
        if(prompt("كلمة سر المدرس:") === "1234") document.getElementById('adminPanel').style.display='block';
    }

    async function uploadTask() {
        const file = document.getElementById('inImg').files[0];
        const status = document.getElementById('status');
        status.style.display = 'block';
        let url = "";

        if(file) {
            const ref = storage.ref('pics/' + Date.now());
            await ref.put(file);
            url = await ref.getDownloadURL();
        }

        const data = {
            school: document.getElementById('inSchool').value,
            loc: document.getElementById('inLoc').value,
            teacher: document.getElementById('inTeacher').value,
            subject: document.getElementById('inSubj').value,
            page: document.getElementById('inPage').value,
            grade: document.getElementById('inGrade').value,
            gender: document.getElementById('inGender').value,
            section: document.getElementById('inSection').value,
            notes: document.getElementById('inNotes').value,
            img: url,
            time: new Date().toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'}),
            date: new Date().toLocaleDateString('ar-EG'),
            ts: Date.now()
        };

        await db.ref('tasks').push(data);
        location.reload();
    }

    db.ref('tasks').orderByChild('ts').on('value', snap => {
        const list = document.getElementById('tasksList');
        list.innerHTML = "";
        snap.forEach(child => {
            const v = child.val();
            // تحديث الترويسة بآخر بيانات
            document.getElementById('topSchool').innerText = "مدرسة " + v.school;
            document.getElementById('topSub').innerText = "محافظة " + v.loc;

            list.insertAdjacentHTML('afterbegin', `
                <div class="card task-item">
                    <div class="task-badge">ص ${v.page}</div>
                    <h2 style="color:#1a5298; margin-top:25px;">📚 ${v.subject}</h2>
                    <div class="info-box">
                        <div class="info-unit"><span>👤 المدرس:</span><b>${v.teacher}</b></div>
                        <div class="info-unit"><span>🏫 الصف:</span><b>${v.grade}</b></div>
                        <div class="info-unit"><span>👫 الفرع:</span><b>${v.gender}</b></div>
                        <div class="info-unit"><span>👥 الشعبة:</span><b>${v.section}</b></div>
                        <div class="info-unit"><span>📅 التاريخ:</span><b>${v.date}</b></div>
                        <div class="info-unit"><span>🕒 الساعة:</span><b>${v.time}</b></div>
                    </div>
                    <div style="background:#fff9db; padding:15px; border-radius:15px; border-left:5px solid #fab005;">
                        <b>📝 ملاحظات:</b><br>${v.notes}
                    </div>
                    ${v.img ? `<img src="${v.img}" class="hw-img" onclick="window.open(this.src)">` : ""}
                    <div class="share-row">
                        <a href="https://wa.me/?text=${encodeURIComponent('واجب جديد: ' + v.subject + ' للصف ' + v.grade + ' - ' + window.location.href)}" class="share-btn btn-wa">واتساب</a>
                        <a href="https://t.me/share/url?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent('واجب جديد: ' + v.subject)}" class="share-btn btn-tg">تليجرام</a>
                    </div>
                </div>
            `);
        });
    });
</script>
</body>
            </html>
