<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة مدرستي الرقمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00468c; --accent: #3498db; --bg: #f4f7f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); padding-bottom: 60px; }

        /* الهيدر فخامة مثل الصور */
        header {
            background: linear-gradient(180deg, var(--accent), var(--primary));
            color: white; padding: 40px 20px; text-align: center;
            border-bottom-left-radius: 35px; border-bottom-right-radius: 35px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .container { padding: 15px; max-width: 550px; margin: auto; }

        /* لوحة المدرس (مخفية أوتوماتيكياً) */
        #adminPanel {
            background: white; border-radius: 25px; padding: 20px;
            margin-top: -50px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none; /* مخفية للأهالي */
            border: 2px solid var(--accent);
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from { opacity:0; transform: translateY(-20px); } to { opacity:1; } }

        input, select, textarea { 
            width: 100%; padding: 14px; margin-bottom: 12px; 
            border: 1px solid #ddd; border-radius: 12px; 
            font-family: 'Cairo'; text-align: center; font-size: 15px;
        }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn-post { 
            width: 100%; padding: 16px; background: var(--primary); 
            color: white; border: none; border-radius: 12px; 
            font-weight: 800; font-size: 18px; cursor: pointer; 
        }

        /* كارت الواجب - نسخة طبق الأصل من الصور */
        .hw-card { 
            background: white; border-radius: 22px; margin-top: 25px; 
            overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            border-top: 6px solid var(--primary);
        }
        .hw-top { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .sub-name { font-size: 22px; font-weight: 800; color: var(--primary); }
        .page-badge { background: #e74c3c; color: white; padding: 4px 12px; border-radius: 10px; font-weight: bold; }

        .hw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 15px; }
        .hw-item { background: #f1f5f9; padding: 10px; border-radius: 12px; text-align: center; font-size: 13px; }
        .hw-item b { display: block; color: #222; font-size: 15px; margin-top: 4px; }

        .hw-img { width: 100%; display: block; background: #eee; }
        .hw-nts { padding: 15px; background: #fffdf5; border-top: 1px solid #eee; font-size: 14px; }

        .share-btn { 
            background: #25d366; color: white; padding: 15px; border: none; 
            width: 100%; font-family: 'Cairo'; font-weight: 800;
            cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        /* زر الدخول السري للمدرس (الترس) */
        .admin-trigger { 
            position: fixed; bottom: 20px; left: 20px; 
            background: rgba(0,0,0,0.2); color: white; 
            border: none; border-radius: 50%; width: 45px; height: 45px; 
            cursor: pointer; z-index: 100;
        }
    </style>
</head>
<body>

<button class="admin-trigger" onclick="openAdmin()">⚙️</button>

<header>
    <h1 id="viewSch">منصة الواجبات اليومية</h1>
    <p id="viewLoc">محافظة البصرة - مدرسة النخيلة</p>
</header>

<div class="container">
    <div id="adminPanel">
        <h3 style="text-align:center; margin-bottom:15px; color:var(--primary)">لوحة نشر الواجبات 👨‍🏫</h3>
        <div class="row">
            <input type="text" id="inSch" placeholder="اسم المدرسة">
            <input type="text" id="inLoc" placeholder="المحافظة">
        </div>
        <input type="text" id="inTch" placeholder="اسم المدرس">
        <div class="row">
            <input type="text" id="inSub" placeholder="المادة">
            <input type="number" id="inPag" placeholder="رقم الصفحة">
        </div>
        <div class="row">
            <select id="inGrd">
                <option value="الأول">الأول</option><option value="الثاني">الثاني</option><option value="الثالث">الثالث</option>
                <option value="الرابع">الرابع</option><option value="الخامس">الخامس</option><option value="السادس">السادس</option>
            </select>
            <select id="inGen"><option value="بنين">بنين</option><option value="بنات">بنات</option></select>
        </div>
        <input type="text" id="inSec" placeholder="الشعبة">
        <div style="border:2px dashed #ccc; padding:15px; border-radius:15px; text-align:center; cursor:pointer; margin-bottom:10px" onclick="document.getElementById('fileIn').click()">
            <span id="st">📸 ارفع صورة الملخص</span>
            <input type="file" id="fileIn" accept="image/*" style="display:none" onchange="preview(event)">
        </div>
        <textarea id="inNts" rows="2" placeholder="ملاحظات المدرس..."></textarea>
        <button class="btn-post" onclick="addHW()">نشر الواجب الآن ✅</button>
    </div>

    <div id="hwFeed"></div>
</div>

<script>
    let imgBase64 = "";

    // وظيفة فتح لوحة المدرس بكلمة سر
    function openAdmin() {
        const pass = prompt("الرجاء إدخال كلمة سر المدرس للنشر:");
        if(pass === "1234") { // كلمة السر (تقدر تغيرها)
            const panel = document.getElementById('adminPanel');
            panel.style.display = 'block';
            window.scrollTo(0,0);
            alert("مرحباً بك أيها المدرس، يمكنك الآن النشر.");
        } else {
            alert("عذراً، كلمة السر خاطئة. هذه اللوحة للمدرسين فقط.");
        }
    }

    function preview(e) {
        const r = new FileReader();
        r.onload = () => { imgBase64 = r.result; document.getElementById('st').innerText = "✅ تم اختيار الصورة"; }
        r.readAsDataURL(e.target.files[0]);
    }

    function addHW() {
        const sch = document.getElementById('inSch').value;
        const loc = document.getElementById('inLoc').value;
        const tch = document.getElementById('inTch').value;
        const sub = document.getElementById('inSub').value;
        const pag = document.getElementById('inPag').value;
        const grd = document.getElementById('inGrd').value;
        const gen = document.getElementById('inGen').value;
        const sec = document.getElementById('inSec').value;
        const nts = document.getElementById('inNts').value;

        if(!sch || !sub || !tch) return alert("اكمل البيانات الأساسية!");

        // تحديث الهيدر
        document.getElementById('viewSch').innerText = "مدرسة " + sch;
        document.getElementById('viewLoc').innerText = "محافظة " + loc;

        const time = new Date().toLocaleTimeString('ar-IQ', {hour:'2-digit', minute:'2-digit'});
        const date = new Date().toLocaleDateString('ar-IQ');

        const card = `
            <div class="hw-card">
                <div class="hw-top">
                    <span class="page-badge">ص ${pag}</span>
                    <span class="sub-name">${sub} 📚</span>
                </div>
                <div class="hw-grid">
                    <div class="hw-item">👤 المدرس: <b>${tch}</b></div>
                    <div class="hw-item">🏫 الصف: <b>${grd}</b></div>
                    <div class="hw-item">👫 الفرع: <b>${gen}</b></div>
                    <div class="hw-item">👥 الشعبة: <b>${sec}</b></div>
                    <div class="hw-item">📅 التاريخ: <b>${date}</b></div>
                    <div class="hw-item">🕒 الساعة: <b>${time}</b></div>
                </div>
                ${imgBase64 ? `<img src="${imgBase64}" class="hw-img">` : ''}
                <div class="hw-nts"><b>📝 الملاحظات:</b><br>${nts || 'الواجب في الصورة'}</div>
                <button class="share-btn" onclick="share('${sch}','${sub}','${grd}','${sec}')">إرسال تبليغ للأهالي 📤</button>
            </div>
        `;
        document.getElementById('hwFeed').insertAdjacentHTML('afterbegin', card);
        
        // إخفاء اللوحة بعد النشر وتصفير البيانات
        imgBase64 = "";
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('st').innerText = "📸 ارفع صورة الملخص";
    }

    function share(sch, sub, grd, sec) {
        const msg = `📢 واجب جديد من مدرسة ${sch}:\n📚 المادة: ${sub}\n🏫 الصف: ${grd}\n👥 الشعبة: ${sec}\n🔗 للمتابعة: ${window.location.href}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>
</body>
</html>
