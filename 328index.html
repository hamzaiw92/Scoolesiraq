<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الواجبات المدرسية</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a5298; --bg: #f0f2f5; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .header { background: linear-gradient(180deg, #2a75bb, #1a5298); color: white; text-align: center; padding: 25px 10px; border-radius: 0 0 30px 30px; margin-bottom: 20px; }
        .container { max-width: 500px; margin: 0 auto 20px; padding: 0 15px; }
        .admin-card { background: white; border-radius: 20px; padding: 20px; display: none; border: 2px solid var(--primary); margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-family: 'Cairo'; font-size: 14px; }
        .btn-post { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .hw-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: relative; border: 1px solid #eee; }
        
        /* تنسيق الوقت والتاريخ */
        .post-time { font-size: 11px; color: #888; background: #fff; padding: 2px 8px; border-radius: 5px; border: 1px solid #eee; margin-bottom: 10px; display: inline-block; }
        
        .card-header { border-bottom: 2px solid #f8f9fa; padding-bottom: 10px; margin-bottom: 15px; }
        .school-info { color: var(--primary); font-weight: 900; font-size: 17px; display: block; }
        .location-info { color: #666; font-size: 12px; display: block; }
        .badge-type { background: #e8f4fd; color: #1a5298; padding: 2px 8px; border-radius: 5px; font-size: 11px; margin-right: 5px; border: 1px solid #d1e9ff; }
        .badge-page { position: absolute; left: 15px; top: 15px; background: #e74c3c; color: white; padding: 5px 12px; border-radius: 8px; font-size: 13px; font-weight: bold; z-index: 1; }
        .hw-img { width: 100%; border-radius: 12px; margin-top: 15px; border: 1px solid #ddd; }
        .info-row { display: flex; justify-content: space-between; background: #fdfdfd; padding: 8px; border-radius: 8px; margin: 10px 0; font-size: 13px; border: 1px dashed #ddd; }
        .admin-btns { display: none; gap: 10px; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
        .btn-edit { background: #f39c12; color: white; border: none; padding: 10px; border-radius: 8px; flex: 1; cursor: pointer; }
        .btn-del { background: #c0392b; color: white; border: none; padding: 10px; border-radius: 8px; flex: 1; cursor: pointer; }
        .settings-btn { position: fixed; bottom: 20px; left: 20px; background: #fff; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #ddd; font-size: 24px; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size:22px;">منصة الواجبات المدرسية</h1>
    <p style="margin:5px 0 0; opacity:0.8; font-size:14px;">نظام إدارة الدروس الذكي</p>
</div>

<div class="container">
    <div id="adminPanel" class="admin-card">
        <h3 id="panelTitle" style="text-align:center; color: var(--primary);">إضافة درس جديد</h3>
        <input type="hidden" id="editKey">
        <input type="text" id="inSchool" placeholder="اسم المدرسة (مثال: الاصمعي)">
        <input type="text" id="inLoc" placeholder="المحافظة والقضاء (مثال: كركوك - حي الواسطي)">
        <div style="display:flex; gap:10px;">
            <select id="inType">
                <option value="بنين">بنين</option>
                <option value="بنات">بنات</option>
                <option value="مختلط">مختلط</option>
            </select>
            <input type="text" id="inSection" placeholder="الشعبة (مثال: أ)">
        </div>
        <input type="text" id="inTeacher" placeholder="اسم المدرس">
        <div style="display:flex; gap:10px;">
            <input type="text" id="inSubj" placeholder="المادة">
            <input type="number" id="inPage" placeholder="رقم الصفحة">
        </div>
        <textarea id="inNotes" style="height:100px;" placeholder="اكتب تفاصيل الواجب هنا..."></textarea>
        <input type="file" id="inImg" accept="image/*">
        <button class="btn-post" id="mainBtn" onclick="processUpload()">🚀 نشر الواجب</button>
        <button class="btn-post" id="cancelBtn" style="display:none; background:#7f8c8d; margin-top:10px;" onclick="location.reload()">إلغاء</button>
    </div>
    <div id="tasksContainer"></div>
</div>

<button class="settings-btn" onclick="openAdmin()">⚙️</button>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC7uiBBwE7DMrC5rWeNkNSnbfS-lJ99kpU",
        authDomain: "myschoolapp-fc61c.firebaseapp.com",
        databaseURL: "https://myschoolapp-fc61c-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "myschoolapp-fc61c",
        storageBucket: "myschoolapp-fc61c.firebasestorage.app",
        appId: "1:187032779714:web:9e7d0f3660c24b1c71b45b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let isLogged = false;

    function openAdmin() { 
        if(prompt("الرمز السري:") === "2025") {
            isLogged = true;
            document.getElementById('adminPanel').style.display = 'block';
            document.querySelectorAll('.admin-btns').forEach(b => b.style.display = 'flex');
        }
    }

    async function processUpload() {
        const file = document.getElementById('inImg').files[0];
        const key = document.getElementById('editKey').value;
        if(file) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => save(reader.result, key);
        } else { save("", key); }
    }

    async function save(img, key) {
        const data = {
            school: document.getElementById('inSchool').value,
            loc: document.getElementById('inLoc').value,
            type: document.getElementById('inType').value,
            section: document.getElementById('inSection').value,
            teacher: document.getElementById('inTeacher').value,
            subj: document.getElementById('inSubj').value,
            page: document.getElementById('inPage').value,
            notes: document.getElementById('inNotes').value,
            img: img || "",
            // تخزين تاريخ النشر بالكامل
            fullDate: new Date().toLocaleString('ar-EG', { hour12: true }),
            ts: Date.now()
        };
        if(key) await db.ref('homework/'+key).update(data);
        else await db.ref('homework').push(data);
        location.reload();
    }

    function edit(key, d) {
        document.getElementById('editKey').value = key;
        document.getElementById('inSchool').value = d.school;
        document.getElementById('inLoc').value = d.loc;
        document.getElementById('inType').value = d.type || "بنين";
        document.getElementById('inSection').value = d.section || "";
        document.getElementById('inTeacher').value = d.teacher;
        document.getElementById('inSubj').value = d.subj;
        document.getElementById('inPage').value = d.page;
        document.getElementById('inNotes').value = d.notes;
        document.getElementById('panelTitle').innerText = "📝 تعديل";
        document.getElementById('mainBtn').innerText = "تحديث";
        document.getElementById('cancelBtn').style.display = 'block';
        window.scrollTo(0,0);
    }

    db.ref('homework').orderByChild('ts').on('value', snap => {
        const container = document.getElementById('tasksContainer');
        container.innerHTML = "";
        snap.forEach(child => {
            const v = child.val();
            const k = child.key;
            container.insertAdjacentHTML('afterbegin', `
                <div class="hw-card">
                    <div class="badge-page">ص ${v.page}</div>
                    <div class="post-time">🕒 تاريخ النشر: ${v.fullDate || 'غير متوفر'}</div>
                    <div class="card-header">
                        <span class="school-info">🏫 مدرسة ${v.school} <span class="badge-type">${v.type || ''}</span></span>
                        <span class="location-info">📍 ${v.loc} | الشعبة: <b>${v.section || '-'}</b></span>
                    </div>
                    <h2 style="color:var(--primary); margin:0 0 10px; font-size:18px;">📚 واجب ${v.subj}</h2>
                    <div class="info-row">
                        <span>👨‍🏫 المدرس: <b>${v.teacher}</b></span>
                        <span>📄 ص: <b>${v.page}</b></span>
                    </div>
                    <p>${v.notes}</p>
                    ${v.img ? `<img src="${v.img}" class="hw-img">` : ""}
                    <div class="admin-btns" style="display: ${isLogged ? 'flex' : 'none'}">
                        <button class="btn-edit" onclick='edit("${k}", ${JSON.stringify(v)})'>تعديل</button>
                        <button class="btn-del" onclick="if(confirm('حذف؟')) db.ref('homework/${k}').remove().then(()=>location.reload())">حذف</button>
                    </div>
                </div>
            `);
        });
    });
</script>
</body>
</html>
